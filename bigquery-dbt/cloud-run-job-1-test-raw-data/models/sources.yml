version: 2

sources:
  - name: data_raw
    description: "Source data from staging dataset"
    schema: staging 
    tables:
      - name: raw_data 
        description: "Raw financial transaction data"
        columns:
          - name: ID1
            description: "Transaction identifier"
            tests:
              - not_null
          
          - name: ID2
            description: "Merchant identifier"
            tests:
              - not_null
          
          - name: ID3
            description: "Customer identifier"
            tests:
              - not_null
          
          - name: String1
            description: "Business category"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['Retail', 'Wholesale', 'Online', 'Subscription', 'B2B', 'Marketplace']
          
          - name: String2
            description: "Currency code"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['EUR', 'USD', 'GBP', 'PLN', 'SEK', 'NOK']
          
          - name: String3
            description: "Reference token"
            tests:
              - not_null
              - unique
          
          - name: Float1
            description: "Gross transaction amount"
            tests:
              - not_null
          
          - name: Float2
            description: "Fee amount"
            tests:
              - not_null
          
          - name: Float3
            description: "Net amount"
            tests:
              - not_null
          
          - name: Status
            description: "Transaction status"
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['Settled', 'Pending', 'Failed', 'Reversed', 'Cancelled', 'In Review']
